<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg-1: #f4f8ff;
        --bg-2: #eef3ff;
        --card-bg: rgba(255, 255, 255, 0.86);
        --card-border: #d7e1f5;
        --text-main: #10223d;
        --text-sub: #587198;
        --input-border: #b5c4df;
        --primary: #1f64d6;
        --primary-hover: #1052be;
        --up: #d63c3c;
        --down: #128b4c;
        --flat: #5b6678;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 780px;
        margin: 0;
        padding: 14px;
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", sans-serif;
        background: linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 100%);
        display: flex;
        flex-direction: column;
        gap: 10px;
        color: var(--text-main);
      }

      .panel {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 10px 24px rgba(15, 53, 117, 0.08);
      }

      .title {
        margin: 0 0 8px;
        font-size: 16px;
        font-weight: 650;
        letter-spacing: 0.2px;
      }

      .input-wrapper input {
        width: 100%;
        padding: 9px 12px;
        font-size: 14px;
        color: var(--text-main);
        background: #fff;
        border: 1px solid var(--input-border);
        border-radius: 6px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        outline: none;
      }

      .input-wrapper input:hover {
        border-color: var(--primary);
      }

      .input-wrapper input:focus {
        border-color: var(--primary-hover);
        box-shadow: 0 0 0 2px rgba(31, 100, 214, 0.17);
      }

      .input-wrapper input::placeholder {
        color: #9baac5;
      }

      .hint {
        font-size: 12px;
        color: var(--text-sub);
        margin: 8px 0 0;
      }

      .watchlist-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .watchlist-title {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
      }

      .watchlist-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }

      .fetch-state {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 2px 8px;
        line-height: 1.5;
        background: rgba(31, 100, 214, 0.11);
        color: var(--primary-hover);
      }

      .fetch-state.loading {
        background: rgba(31, 100, 214, 0.2);
      }

      .update-time {
        font-variant-numeric: tabular-nums;
        color: var(--text-sub);
      }

      .error-banner {
        margin: 0 0 8px;
        border-radius: 8px;
        padding: 6px 8px;
        background: #ffecec;
        color: #a13333;
        font-size: 12px;
      }

      .error-banner.hidden {
        display: none;
      }

      .table-wrap {
        border: 1px solid #d5deef;
        border-radius: 8px;
        overflow-x: auto;
        background: #fff;
      }

      table {
        width: 100%;
        min-width: 700px;
        border-collapse: collapse;
      }

      thead th {
        text-align: left;
        padding: 8px 10px;
        font-size: 12px;
        color: #435775;
        background: #edf3ff;
        border-bottom: 1px solid #dde6f7;
        letter-spacing: 0.18px;
      }

      thead th.num,
      tbody td.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
        font-family: "JetBrains Mono", "Menlo", "Consolas", monospace;
      }

      tbody tr {
        border-bottom: 1px solid #edf2fa;
      }

      tbody tr:last-child {
        border-bottom: none;
      }

      tbody tr.data-row:hover {
        background: #f7faff;
      }

      tbody tr.data-row {
        cursor: pointer;
      }

      tbody td {
        padding: 7px 10px;
        font-size: 12px;
      }

      tbody td.code {
        text-transform: lowercase;
      }

      tbody td.section-cell {
        padding: 7px 10px;
        background: #f8fbff;
        color: #4f6788;
        font-size: 12px;
        font-weight: 620;
      }

      tbody td.empty {
        text-align: center;
        color: #7388a8;
        padding: 10px;
      }

      .chg.up {
        color: var(--up);
      }

      .chg.down {
        color: var(--down);
      }

      .chg.flat {
        color: var(--flat);
      }

      .source-note {
        margin: 8px 0 0;
        font-size: 11px;
        color: #6d7f9c;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1 class="title">雪球查股助手</h1>
      <div class="input-wrapper">
        <input
          type="text"
          id="stockInput"
          placeholder="输入代码, 如 sz000001 / 00700 / AAPL"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <p class="hint">支持沪深/港股/美股，按回车键 (Enter) 在新标签页打开</p>
    </section>

    <section class="panel">
      <div class="watchlist-header">
        <h2 class="watchlist-title">实时行情</h2>
        <div class="watchlist-meta">
          <span id="fetchState" class="fetch-state">准备中</span>
          <span id="updateTime" class="update-time">--:--:--</span>
        </div>
      </div>
      <p id="errorBanner" class="error-banner hidden"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>CODE</th>
              <th>NAME</th>
              <th class="num">LATEST</th>
              <th class="num">CHANGE</th>
              <th class="num">OPEN</th>
              <th class="num">HIGH</th>
              <th class="num">LOW</th>
            </tr>
          </thead>
          <tbody id="quoteBody">
            <tr>
              <td class="empty" colspan="7">正在加载行情...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <p class="source-note">数据源：腾讯行情接口，每 1 秒自动刷新</p>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
